services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: email-triage-app:local
    container_name: email-triage-app
    init: true
    ports:
      - "${PORT:-8000}:8000"
    environment:
      APP_ENV: "${APP_ENV:-local}"
      ENVIRONMENT: "${APP_ENV:-local}"
      HOST: "0.0.0.0"
      PORT: "8000"
      RUNS_DIR: "/app/runs"
      LLM_PROVIDER: "${LLM_PROVIDER:-mock}"
      LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-6}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      AZURE_FOUNDRY_RESOURCE: "${AZURE_FOUNDRY_RESOURCE:-}"
      AZURE_FOUNDRY_BASE_URL: "${AZURE_FOUNDRY_BASE_URL:-}"
      AZURE_FOUNDRY_API_KEY: "${AZURE_FOUNDRY_API_KEY:-}"
      LOGFIRE_TOKEN: "${LOGFIRE_TOKEN:-}"
      LOGFIRE_ENVIRONMENT: "${LOGFIRE_ENVIRONMENT:-local}"
      TRIAGE_API_KEY: "${TRIAGE_API_KEY:-change-me-local}"
    volumes:
      - ./runs:/app/runs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
